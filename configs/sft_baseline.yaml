# ============================================================
# sft_baseline.yaml — 方案0：Baseline SFT（直接预测数字答案）
# ============================================================
inherit: base

data:
  train_path: "data/raw/train.json"
  max_length: 384

training:
  output_dir: "outputs/checkpoints/baseline"
  num_train_epochs: 5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4

logging:
  run_name: "baseline-sft"
  tags: ["baseline", "sft", "direct-answer"]
